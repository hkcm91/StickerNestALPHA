<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A pomodoro focus timer with work/break cycles and session tracking">
  <title>Pomodoro Timer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--sn-font-family, 'Inter', system-ui, sans-serif);
      background: var(--sn-bg, #0a0a0a);
      color: var(--sn-text, #e0e0e0);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }
    .timer-container {
      text-align: center;
      padding: 32px 40px;
      border-radius: var(--sn-radius, 12px);
      background: var(--sn-surface, #141414);
      border: 1px solid var(--sn-border, #2a2a2a);
      min-width: 260px;
    }
    .mode-label {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
      transition: color 0.3s;
    }
    .mode-work { color: #ef4444; }
    .mode-break { color: #22c55e; }
    .time-display {
      font-size: 56px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      line-height: 1.1;
      margin-bottom: 8px;
      color: var(--sn-text, #e0e0e0);
    }
    .session-count {
      font-size: 12px;
      color: var(--sn-text-muted, #888);
      margin-bottom: 20px;
    }
    .controls {
      display: flex;
      gap: 8px;
      justify-content: center;
    }
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: var(--sn-radius, 8px);
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-start { background: var(--sn-accent, #6366f1); color: #fff; }
    .btn-pause { background: #f59e0b; color: #000; }
    .btn-reset {
      background: transparent;
      border: 1px solid var(--sn-border, #2a2a2a);
      color: var(--sn-text-muted, #888);
    }
    .btn-skip {
      background: transparent;
      border: 1px solid var(--sn-border, #2a2a2a);
      color: var(--sn-text-muted, #888);
      font-size: 12px;
      padding: 8px 14px;
    }
    .progress-ring {
      width: 180px;
      height: 180px;
      margin: 0 auto 12px;
      position: relative;
    }
    .progress-ring svg { transform: rotate(-90deg); }
    .progress-ring circle {
      fill: none;
      stroke-width: 4;
    }
    .progress-bg { stroke: var(--sn-border, #2a2a2a); }
    .progress-bar { transition: stroke-dashoffset 1s linear; stroke-linecap: round; }
    .time-inside {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="timer-container">
    <div class="mode-label mode-work" id="modeLabel">FOCUS</div>

    <div class="progress-ring">
      <svg width="180" height="180" viewBox="0 0 180 180">
        <circle class="progress-bg" cx="90" cy="90" r="82" />
        <circle class="progress-bar" id="progressBar" cx="90" cy="90" r="82"
          stroke="var(--sn-accent, #6366f1)"
          stroke-dasharray="515.22"
          stroke-dashoffset="0" />
      </svg>
      <div class="time-inside">
        <div class="time-display" id="timeDisplay">25:00</div>
      </div>
    </div>

    <div class="session-count" id="sessionCount">Session 1 of 4</div>

    <div class="controls">
      <button class="btn btn-start" id="startBtn">Start</button>
      <button class="btn btn-reset" id="resetBtn">Reset</button>
      <button class="btn btn-skip" id="skipBtn">Skip</button>
    </div>
  </div>

  <script>
    StickerNest.register({
      id: 'pomodoro-timer',
      name: 'Pomodoro Timer',
      version: '1.0.0',
      description: 'A focus timer with work/break cycles and session tracking',
      category: 'productivity',
      tags: ['timer', 'pomodoro', 'focus', 'productivity'],
      license: 'MIT',
    });

    const WORK_MINS = 25;
    const BREAK_MINS = 5;
    const LONG_BREAK_MINS = 15;
    const SESSIONS_BEFORE_LONG = 4;
    const CIRCUMFERENCE = 2 * Math.PI * 82;

    let timeLeft = WORK_MINS * 60;
    let totalTime = WORK_MINS * 60;
    let isRunning = false;
    let isBreak = false;
    let session = 1;
    let interval = null;

    const timeDisplay = document.getElementById('timeDisplay');
    const modeLabel = document.getElementById('modeLabel');
    const sessionCount = document.getElementById('sessionCount');
    const startBtn = document.getElementById('startBtn');
    const resetBtn = document.getElementById('resetBtn');
    const skipBtn = document.getElementById('skipBtn');
    const progressBar = document.getElementById('progressBar');

    function formatTime(s) {
      const m = Math.floor(s / 60);
      const sec = s % 60;
      return `${m.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
    }

    function updateDisplay() {
      timeDisplay.textContent = formatTime(timeLeft);
      const progress = 1 - (timeLeft / totalTime);
      progressBar.style.strokeDashoffset = CIRCUMFERENCE * (1 - progress);
      progressBar.style.stroke = isBreak ? '#22c55e' : 'var(--sn-accent, #6366f1)';
    }

    function tick() {
      if (timeLeft <= 0) {
        clearInterval(interval);
        interval = null;
        isRunning = false;

        if (!isBreak) {
          StickerNest.emit('pomodoro.completed', { session });
          const isLong = session % SESSIONS_BEFORE_LONG === 0;
          isBreak = true;
          timeLeft = (isLong ? LONG_BREAK_MINS : BREAK_MINS) * 60;
          totalTime = timeLeft;
          modeLabel.textContent = isLong ? 'LONG BREAK' : 'BREAK';
          modeLabel.className = 'mode-label mode-break';
        } else {
          isBreak = false;
          session++;
          timeLeft = WORK_MINS * 60;
          totalTime = timeLeft;
          modeLabel.textContent = 'FOCUS';
          modeLabel.className = 'mode-label mode-work';
        }

        sessionCount.textContent = `Session ${session} of ${SESSIONS_BEFORE_LONG}`;
        startBtn.textContent = 'Start';
        startBtn.className = 'btn btn-start';
        updateDisplay();

        StickerNest.setState('session', session);
        return;
      }
      timeLeft--;
      updateDisplay();
    }

    startBtn.addEventListener('click', () => {
      if (isRunning) {
        clearInterval(interval);
        interval = null;
        isRunning = false;
        startBtn.textContent = 'Resume';
        startBtn.className = 'btn btn-start';
        StickerNest.emit('pomodoro.paused', { timeLeft, session });
      } else {
        interval = setInterval(tick, 1000);
        isRunning = true;
        startBtn.textContent = 'Pause';
        startBtn.className = 'btn btn-pause';
        StickerNest.emit('pomodoro.started', { isBreak, session });
      }
    });

    resetBtn.addEventListener('click', () => {
      clearInterval(interval);
      interval = null;
      isRunning = false;
      isBreak = false;
      timeLeft = WORK_MINS * 60;
      totalTime = timeLeft;
      modeLabel.textContent = 'FOCUS';
      modeLabel.className = 'mode-label mode-work';
      startBtn.textContent = 'Start';
      startBtn.className = 'btn btn-start';
      updateDisplay();
    });

    skipBtn.addEventListener('click', () => {
      timeLeft = 0;
      tick();
    });

    // Restore session
    StickerNest.getState('session').then((saved) => {
      if (typeof saved === 'number' && saved > 1) {
        session = saved;
        sessionCount.textContent = `Session ${session} of ${SESSIONS_BEFORE_LONG}`;
      }
    });

    updateDisplay();
    StickerNest.onThemeChange(() => {});
    StickerNest.ready();
  </script>
</body>
</html>
