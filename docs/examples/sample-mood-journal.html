<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A daily mood journal with emoji mood picker and notes">
  <title>Mood Journal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--sn-font-family, 'Inter', system-ui, sans-serif);
      background: var(--sn-bg, #0a0a0a);
      color: var(--sn-text, #e0e0e0);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }
    .journal {
      padding: 24px;
      border-radius: var(--sn-radius, 12px);
      background: var(--sn-surface, #141414);
      border: 1px solid var(--sn-border, #2a2a2a);
      width: 300px;
    }
    .date-header {
      font-size: 12px;
      color: var(--sn-text-muted, #888);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }
    .prompt {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 20px;
    }
    .mood-picker {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .mood-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 2px solid transparent;
      background: var(--sn-bg, #0a0a0a);
      font-size: 24px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .mood-btn:hover { transform: scale(1.15); }
    .mood-btn.selected {
      border-color: var(--sn-accent, #6366f1);
      background: rgba(99, 102, 241, 0.1);
      transform: scale(1.1);
    }
    .mood-label {
      text-align: center;
      font-size: 11px;
      color: var(--sn-text-muted, #888);
      margin-top: 4px;
    }
    .note-area {
      width: 100%;
      min-height: 80px;
      padding: 12px;
      border-radius: var(--sn-radius, 8px);
      border: 1px solid var(--sn-border, #2a2a2a);
      background: var(--sn-bg, #0a0a0a);
      color: var(--sn-text, #e0e0e0);
      font-size: 13px;
      font-family: inherit;
      resize: vertical;
      outline: none;
      margin-bottom: 16px;
    }
    .note-area:focus { border-color: var(--sn-accent, #6366f1); }
    .note-area::placeholder { color: var(--sn-text-muted, #888); }
    .save-btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: var(--sn-radius, 8px);
      background: var(--sn-accent, #6366f1);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.15s;
      margin-bottom: 16px;
    }
    .save-btn:hover { opacity: 0.85; }
    .save-btn:disabled { opacity: 0.4; cursor: default; }
    .saved-msg {
      text-align: center;
      font-size: 12px;
      color: #22c55e;
      margin-bottom: 16px;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .saved-msg.show { opacity: 1; }
    .history-title {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--sn-text-muted, #888);
    }
    .history-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 120px;
      overflow-y: auto;
    }
    .history-entry {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      padding: 6px 8px;
      border-radius: 6px;
      background: var(--sn-bg, #0a0a0a);
    }
    .history-entry .date { color: var(--sn-text-muted, #888); flex-shrink: 0; }
    .history-entry .emoji { font-size: 16px; }
    .history-entry .note {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--sn-text-muted, #888);
    }
  </style>
</head>
<body>
  <div class="journal">
    <div class="date-header" id="dateHeader"></div>
    <div class="prompt">How are you feeling?</div>

    <div class="mood-picker" id="moodPicker">
      <div>
        <button class="mood-btn" data-mood="awful" title="Awful">&#128534;</button>
        <div class="mood-label">Awful</div>
      </div>
      <div>
        <button class="mood-btn" data-mood="bad" title="Bad">&#128533;</button>
        <div class="mood-label">Bad</div>
      </div>
      <div>
        <button class="mood-btn" data-mood="okay" title="Okay">&#128528;</button>
        <div class="mood-label">Okay</div>
      </div>
      <div>
        <button class="mood-btn" data-mood="good" title="Good">&#128522;</button>
        <div class="mood-label">Good</div>
      </div>
      <div>
        <button class="mood-btn" data-mood="great" title="Great">&#129321;</button>
        <div class="mood-label">Great</div>
      </div>
    </div>

    <textarea class="note-area" id="noteArea" placeholder="What's on your mind today..."></textarea>

    <button class="save-btn" id="saveBtn" disabled>Save Entry</button>
    <div class="saved-msg" id="savedMsg">Saved!</div>

    <div class="history-title">Recent Entries</div>
    <div class="history-list" id="historyList"></div>
  </div>

  <script>
    StickerNest.register({
      id: 'mood-journal',
      name: 'Mood Journal',
      version: '1.0.0',
      description: 'A daily mood journal with emoji picker and notes',
      category: 'productivity',
      tags: ['journal', 'mood', 'wellbeing', 'daily', 'diary'],
      license: 'MIT',
    });

    const today = new Date();
    const dateStr = today.toISOString().slice(0, 10);
    document.getElementById('dateHeader').textContent = today.toLocaleDateString('en-US', {
      weekday: 'long', month: 'long', day: 'numeric',
    });

    let selectedMood = null;
    let entries = [];

    const moodEmojis = { awful: '\uD83D\uDE16', bad: '\uD83D\uDE15', okay: '\uD83D\uDE10', good: '\uD83D\uDE0A', great: '\uD83E\uDD29' };

    // Mood selection
    document.getElementById('moodPicker').addEventListener('click', (e) => {
      const btn = e.target.closest('.mood-btn');
      if (!btn) return;
      document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedMood = btn.dataset.mood;
      document.getElementById('saveBtn').disabled = false;
    });

    // Save
    document.getElementById('saveBtn').addEventListener('click', () => {
      if (!selectedMood) return;
      const note = document.getElementById('noteArea').value.trim();
      const entry = { date: dateStr, mood: selectedMood, emoji: moodEmojis[selectedMood], note };

      // Remove existing entry for today
      entries = entries.filter(e => e.date !== dateStr);
      entries.unshift(entry);
      if (entries.length > 30) entries = entries.slice(0, 30);

      StickerNest.setState('entries', entries);
      StickerNest.emit('mood.logged', { mood: selectedMood, date: dateStr });

      const msg = document.getElementById('savedMsg');
      msg.classList.add('show');
      setTimeout(() => msg.classList.remove('show'), 2000);

      renderHistory();
    });

    function renderHistory() {
      const list = document.getElementById('historyList');
      list.innerHTML = entries.slice(0, 7).map(e => `
        <div class="history-entry">
          <span class="emoji">${e.emoji}</span>
          <span class="date">${e.date.slice(5)}</span>
          <span class="note">${e.note || '--'}</span>
        </div>
      `).join('');
    }

    // Restore
    StickerNest.getState('entries').then((saved) => {
      if (Array.isArray(saved)) {
        entries = saved;
        const todayEntry = entries.find(e => e.date === dateStr);
        if (todayEntry) {
          selectedMood = todayEntry.mood;
          const btn = document.querySelector(`.mood-btn[data-mood="${selectedMood}"]`);
          if (btn) btn.classList.add('selected');
          document.getElementById('noteArea').value = todayEntry.note || '';
          document.getElementById('saveBtn').disabled = false;
        }
      }
      renderHistory();
    }).catch(() => renderHistory());

    StickerNest.onThemeChange(() => {});
    StickerNest.ready();
  </script>
</body>
</html>
