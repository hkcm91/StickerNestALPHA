# StickerNest V5 - Supabase Local Development Configuration
# Documentation: https://supabase.com/docs/guides/cli/config

[api]
enabled = true
# Port to use for the API URL
port = 54321
# Schemas to expose in your API. Tables, views and stored procedures in this schema will get API endpoints.
schemas = ["public", "graphql_public"]
# Extra schemas to add to the search_path of every request. 'public' is always included.
extra_search_path = ["public", "extensions"]
# The maximum number of rows returned from a view, table, or stored procedure. Limits payload size.
max_rows = 1000

[db]
# Port to use for the local database URL
port = 54322
# Port used by db diff command to initialize the shadow database
shadow_port = 54320
# The database major version to use. This has to be the same as your remote database's.
major_version = 15

[db.pooler]
enabled = false
# Port to use for the local connection pooler
port = 54329
# Specifies when a server connection can be reused by other clients
pool_mode = "transaction"
# How many server connections to allow per user/database pair
default_pool_size = 20
# Maximum number of client connections allowed
max_client_conn = 100

[realtime]
enabled = true
# Bind realtime via either IPv4 or IPv6 (default: IPv6)
# ip_version = "IPv6"
# The maximum length in bytes of HTTP request headers
# max_header_length = 4096

[studio]
enabled = true
# Port to use for Supabase Studio
port = 54323
# External URL of the API server that frontend connects to
api_url = "http://127.0.0.1"
# OpenAI API Key to use for Supabase AI in the Studio
# openai_api_key = "env(OPENAI_API_KEY)"

# Email testing server (Inbucket)
[inbucket]
enabled = true
# Port to use for the email testing server web interface
port = 54324
# Uncomment to expose additional ports for smtp and pop3
# smtp_port = 54325
# pop3_port = 54326

[storage]
enabled = true
# The maximum file size allowed (e.g. "5MB", "500KB")
file_size_limit = "50MiB"

[storage.image_transformation]
enabled = true

[auth]
enabled = true
# The base URL of your website. Used for redirects, like OAuth login
site_url = "http://127.0.0.1:3000"
# A list of *exact* URLs that auth providers are permitted to redirect to post authentication
additional_redirect_urls = ["https://127.0.0.1:3000"]
# How long tokens are valid for, in seconds. Defaults to 3600 (1 hour)
jwt_expiry = 3600
# If disabled, the refresh token will never expire
enable_refresh_token_rotation = true
# Allows refresh tokens to be reused after expiry, up to the specified interval in seconds
refresh_token_reuse_interval = 10
# Allow/disallow new user signups to your project
enable_signup = true
# Allow/disallow testing manual linking of accounts
enable_manual_linking = false

[auth.email]
# Allow/disallow new user signups via email to your project
enable_signup = true
# If enabled, a user will be required to confirm any email change on both the old and new email addresses
double_confirm_changes = true
# If enabled, users need to confirm their email address before signing in
enable_confirmations = false

[auth.sms]
# Allow/disallow new user signups via SMS to your project
enable_signup = true
# If enabled, users need to confirm their phone number before signing in
enable_confirmations = false

# Uncomment to customize email template
# [auth.email.template.invite]
# subject = "You have been invited"
# content_path = "./supabase/templates/invite.html"

[auth.external.apple]
enabled = false
client_id = ""
# DO NOT commit your secret to git. Use environment variables instead.
secret = "env(SUPABASE_AUTH_EXTERNAL_APPLE_SECRET)"
# Overrides the default auth redirectUrl
redirect_uri = ""
# Overrides the default auth provider URL. Used to support self-hosted auth service
url = ""

[auth.external.google]
enabled = false
client_id = "env(SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID)"
# DO NOT commit your secret to git. Use environment variables instead.
secret = "env(SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET)"
# Overrides the default auth redirectUrl
redirect_uri = ""
# Overrides the default auth provider URL. Used to support self-hosted auth service
url = ""

[auth.external.github]
enabled = false
client_id = "env(SUPABASE_AUTH_EXTERNAL_GITHUB_CLIENT_ID)"
# DO NOT commit your secret to git. Use environment variables instead.
secret = "env(SUPABASE_AUTH_EXTERNAL_GITHUB_SECRET)"
# Overrides the default auth redirectUrl
redirect_uri = ""
# Overrides the default auth provider URL. Used to support self-hosted auth service
url = ""

[functions]
# Allow functions to handle their own JWT verification
# This is necessary because some functions need to:
# 1. Accept OAuth callbacks (no JWT)
# 2. Accept Stripe webhooks (no JWT, uses signature verification)
# 3. Return proper error messages instead of generic 401

[functions.notion-oauth]
verify_jwt = false

[functions.notion-proxy]
verify_jwt = false

[functions.stripe-webhook]
verify_jwt = false

[functions.stripe-checkout]
verify_jwt = false

[functions.stripe-portal]
verify_jwt = false

[functions.creator-checkout]
verify_jwt = false

[functions.creator-webhook]
verify_jwt = false

[functions.connect-webhook]
verify_jwt = false

[functions.connect-onboard]
verify_jwt = false

[functions.connect-dashboard]
verify_jwt = false

[functions.customer-portal]
verify_jwt = false

[functions.cancel-subscription]
verify_jwt = false

[functions.request-refund]
verify_jwt = false

[functions.ai-generate]
verify_jwt = false

[functions.api-key-save]
verify_jwt = false

[analytics]
enabled = false
port = 54327
vector_port = 54328
# Setup BigQuery project to enable log export
# gcp_project_id = ""
# gcp_project_number = ""
# gcp_jwt_path = "supabase/gcloud.json"

# Experimental features may be deprecated without notice
[experimental]
# Configures Postgres storage engine to use OrioleDB (S3)
orioledb_version = ""
# Configures S3 bucket URL, eg. <bucket_name>.s3-<region>.amazonaws.com
s3_host = ""
# Configures S3 bucket region, eg. us-east-1
s3_region = ""
# Configures AWS_ACCESS_KEY_ID for S3 bucket
s3_access_key = ""
# Configures AWS_SECRET_ACCESS_KEY for S3 bucket
s3_secret_key = ""
