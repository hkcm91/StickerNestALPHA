<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StickerNest — Messages</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { --bg: #0a0a0f; --surface: rgba(255,255,255,0.05); --accent: #00e5c7; --accent-alt: #a855f7; --text: #f0f0f5; --text-muted: #a0a0aa; }
    body { font-family: 'Space Grotesk', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; }

    /* Noise overlay */
    body::before { content: ''; position: fixed; inset: 0; background: url('data:image/svg+xml,%3Csvg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noise"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise"/%3E%3C/filter%3E%3Crect width="512" height="512" filter="url(%23noise)" opacity="0.03"/%3E%3C/svg%3E'); pointer-events: none; z-index: 0; }

    /* Layout */
    .container { display: flex; height: 100vh; position: relative; z-index: 1; flex-direction: column; }
    .navbar { height: 64px; backdrop-filter: blur(12px); background: rgba(255,255,255,0.02); border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; padding: 0 24px; gap: 16px; }
    .navbar-title { font-size: 18px; font-weight: 600; letter-spacing: -0.5px; color: var(--text); }

    .main { display: flex; flex: 1; overflow: hidden; }

    /* Conversation List */
    .conv-list { width: 320px; background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.01) 100%); border-right: 1px solid rgba(255,255,255,0.1); overflow-y: auto; display: flex; flex-direction: column; }
    .conv-list-header { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.08); }
    .new-msg-btn { width: 100%; padding: 12px 16px; background: linear-gradient(135deg, var(--accent) 0%, #00d4b3 100%); border: none; border-radius: 10px; color: #000; font-weight: 600; cursor: pointer; font-family: 'Space Grotesk', sans-serif; font-size: 14px; box-shadow: 0 0 24px rgba(0,229,199,0.3); transition: all 0.3s ease; }
    .new-msg-btn:hover { transform: translateY(-2px); box-shadow: 0 0 32px rgba(0,229,199,0.5); }

    .conv-items { flex: 1; overflow-y: auto; }
    .conv-item { padding: 12px 16px; cursor: pointer; border-left: 3px solid transparent; transition: all 0.3s ease; position: relative; }
    .conv-item:hover { background: rgba(255,255,255,0.08); }
    .conv-item.active { background: rgba(0,229,199,0.15); border-left-color: var(--accent); }

    .conv-head { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
    .conv-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, var(--accent-alt) 0%, var(--accent) 100%); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 16px; }
    .conv-avatar.online::after { content: ''; position: absolute; width: 12px; height: 12px; background: #10b981; border: 2px solid var(--bg); border-radius: 50%; bottom: 12px; right: 28px; }
    .conv-info { flex: 1; min-width: 0; }
    .conv-name { font-size: 14px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .conv-preview { font-size: 12px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .conv-badge { width: 20px; height: 20px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: #000; flex-shrink: 0; }

    /* Chat View */
    .chat { flex: 1; display: flex; flex-direction: column; background: linear-gradient(135deg, rgba(255,255,255,0.02) 0%, rgba(255,255,255,0.005) 100%); }
    .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px; color: var(--text-muted); }
    .empty-icon { width: 120px; height: 120px; background: rgba(0,229,199,0.1); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 48px; }
    .empty-text { font-size: 16px; text-align: center; }

    .chat-content { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
    .msg-group { display: flex; flex-direction: column; gap: 8px; animation: slideIn 0.4s ease; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    .msg { max-width: 70%; padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.5; }
    .msg.own { margin-left: auto; background: linear-gradient(135deg, var(--accent) 0%, #00d4b3 100%); color: #000; font-weight: 500; }
    .msg.other { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); }

    .msg-time { font-size: 11px; color: var(--text-muted); margin-top: 4px; text-align: right; }
    .msg-group.other .msg-time { text-align: left; }

    .chat-input-bar { padding: 20px; border-top: 1px solid rgba(255,255,255,0.1); display: flex; gap: 12px; align-items: flex-end; }
    .input-wrapper { flex: 1; display: flex; gap: 8px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 10px 12px; backdrop-filter: blur(8px); }
    .chat-input { flex: 1; background: none; border: none; color: var(--text); font-family: 'Space Grotesk', sans-serif; font-size: 14px; outline: none; }
    .chat-input::placeholder { color: var(--text-muted); }

    .icon-btn { width: 32px; height: 32px; background: rgba(0,229,199,0.15); border: 1px solid rgba(0,229,199,0.3); border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.3s ease; color: var(--accent); }
    .icon-btn:hover { background: rgba(0,229,199,0.25); box-shadow: 0 0 12px rgba(0,229,199,0.2); transform: scale(1.05); }

    .send-btn { padding: 8px 16px; background: linear-gradient(135deg, var(--accent) 0%, #00d4b3 100%); border: none; border-radius: 8px; color: #000; font-weight: 600; cursor: pointer; font-family: 'Space Grotesk', sans-serif; font-size: 13px; transition: all 0.3s ease; box-shadow: 0 0 12px rgba(0,229,199,0.2); }
    .send-btn:hover { transform: translateY(-1px); box-shadow: 0 0 20px rgba(0,229,199,0.4); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.15); }

    @media (max-width: 768px) {
      .conv-list { display: none; }
      .msg { max-width: 85%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Global Navbar -->
    <div class="navbar">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2m0 18c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8z"/>
      </svg>
      <div class="navbar-title">Messages</div>
    </div>

    <!-- Main Content -->
    <div class="main">
      <!-- Conversation List -->
      <div class="conv-list">
        <div class="conv-list-header">
          <button class="new-msg-btn">+ New Message</button>
        </div>
        <div class="conv-items" id="convList"></div>
      </div>

      <!-- Chat View -->
      <div class="chat" id="chatView">
        <div class="empty-state">
          <div class="empty-icon">💬</div>
          <div class="empty-text">Select a conversation to start messaging</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const conversations = [
      { id: 1, name: 'Alex Chen', avatar: 'AC', online: true, unread: 2, preview: 'Sounds good!' },
      { id: 2, name: 'Jordan Park', avatar: 'JP', online: false, unread: 0, preview: 'See you tomorrow' },
      { id: 3, name: 'Maya Patel', avatar: 'MP', online: true, unread: 1, preview: 'Love the new design!' },
      { id: 4, name: 'Sam Rivera', avatar: 'SR', online: true, unread: 0, preview: 'Let me check that' },
      { id: 5, name: 'Casey Kim', avatar: 'CK', online: false, unread: 3, preview: 'Can we call soon?' },
    ];

    const messages = {
      1: [
        { own: false, text: 'Hey! How are you?' },
        { own: true, text: 'Great! Just finished the design review' },
        { own: false, text: 'Awesome! Can you share the mockups?' },
        { own: true, text: 'Absolutely, sending them now' },
        { own: false, text: 'Sounds good!' },
      ],
      2: [
        { own: true, text: 'Hi Jordan, did you get the email?' },
        { own: false, text: 'Yes, just reviewed it' },
        { own: true, text: 'Great, what do you think?' },
        { own: false, text: 'See you tomorrow' },
      ],
      3: [
        { own: false, text: 'Just saw the new UI!' },
        { own: true, text: 'What do you think?' },
        { own: false, text: 'Love the new design!' },
      ],
      4: [
        { own: true, text: 'Can you review the PR?' },
        { own: false, text: 'Let me check that' },
      ],
      5: [
        { own: false, text: 'Hey, been a while!' },
        { own: true, text: 'I know! Let me find time' },
        { own: false, text: 'Can we call soon?' },
      ],
    };

    function renderConversations() {
      const list = document.getElementById('convList');
      list.innerHTML = conversations.map(conv => `
        <div class="conv-item ${conv.id === 1 ? 'active' : ''}" onclick="selectConversation(${conv.id})">
          <div class="conv-head">
            <div class="conv-avatar ${conv.online ? 'online' : ''}">${conv.avatar}</div>
            <div class="conv-info">
              <div class="conv-name">${conv.name}</div>
              <div class="conv-preview">${conv.preview}</div>
            </div>
            ${conv.unread > 0 ? `<div class="conv-badge">${conv.unread}</div>` : ''}
          </div>
        </div>
      `).join('');
    }

    function selectConversation(id) {
      document.querySelectorAll('.conv-item').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.conv-item')[id - 1].classList.add('active');
      renderChat(id);
    }

    function renderChat(id) {
      const chat = document.getElementById('chatView');
      const msgs = messages[id] || [];
      chat.innerHTML = `
        <div class="chat-content">
          ${msgs.map((msg, i) => `
            <div class="msg-group ${msg.own ? 'own' : 'other'}">
              <div class="msg ${msg.own ? 'own' : 'other'}">${msg.text}</div>
              <div class="msg-time">${new Date(Date.now() - (msgs.length - i) * 60000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div>
            </div>
          `).join('')}
        </div>
        <div class="chat-input-bar">
          <div class="input-wrapper">
            <input type="text" class="chat-input" placeholder="Type a message...">
            <button class="icon-btn">📎</button>
            <button class="icon-btn">😊</button>
          </div>
          <button class="send-btn">Send</button>
        </div>
      `;
    }

    renderConversations();
    selectConversation(1);
  </script>
</body>
</html>
