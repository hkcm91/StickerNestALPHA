<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StickerNest V5 — Canvas Side Panels Redesign</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --sn-bg: #0a0a0f;
            --sn-surface: rgba(30, 30, 45, 0.4);
            --sn-surface-alt: rgba(40, 40, 60, 0.3);
            --sn-accent: #00e5c7;
            --sn-accent-alt: #a855f7;
            --sn-text: #f8f8ff;
            --sn-text-muted: #a0a0b0;
            --sn-border: rgba(255, 255, 255, 0.1);
            --sn-glow: rgba(0, 229, 199, 0.2);
            --sn-glow-alt: rgba(168, 85, 247, 0.15);
        }

        body {
            background: var(--sn-bg);
            color: var(--sn-text);
            font-family: 'Space Grotesk', sans-serif;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Dot grid background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                radial-gradient(circle, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }

        .canvas-container {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100%;
            display: flex;
            overflow: hidden;
        }

        /* Left side — Assets panel */
        .panel-left {
            width: 320px;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 16px;
            gap: 12px;
        }

        /* Right side — Docker + Properties */
        .panel-right {
            width: 280px;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 16px;
            gap: 12px;
            margin-left: auto;
        }

        /* Canvas center */
        .canvas-center {
            flex: 1;
            background: linear-gradient(135deg, rgba(10, 10, 15, 0.5) 0%, rgba(20, 15, 30, 0.5) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            border-left: 1px solid var(--sn-border);
            border-right: 1px solid var(--sn-border);
            position: relative;
        }

        .canvas-grid {
            color: var(--sn-text-muted);
            font-size: 12px;
            opacity: 0.4;
        }

        /* Glassmorphism panels */
        .glass-panel {
            background: var(--sn-surface);
            backdrop-filter: blur(12px) brightness(1.1);
            border: 1px solid var(--sn-border);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), inset 0 1px 1px rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            animation: slideInPanel 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        @keyframes slideInPanel {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Tab handles */
        .panel-tabs {
            display: flex;
            gap: 8px;
            padding: 12px;
            border-bottom: 1px solid var(--sn-border);
            background: rgba(20, 20, 30, 0.3);
        }

        .tab-handle {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--sn-border);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .tab-handle:hover {
            background: rgba(0, 229, 199, 0.15);
            border-color: var(--sn-accent);
            box-shadow: 0 0 12px var(--sn-glow);
            transform: translateY(-2px);
        }

        .tab-handle.active {
            background: rgba(0, 229, 199, 0.2);
            border-color: var(--sn-accent);
            box-shadow: 0 0 16px var(--sn-glow);
        }

        .tab-icon {
            width: 16px;
            height: 16px;
            stroke: var(--sn-text-muted);
            transition: stroke 0.3s ease;
        }

        .tab-handle:hover .tab-icon,
        .tab-handle.active .tab-icon {
            stroke: var(--sn-accent);
        }

        /* Panel content */
        .panel-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .panel-content::-webkit-scrollbar {
            width: 6px;
        }

        .panel-content::-webkit-scrollbar-track {
            background: transparent;
        }

        .panel-content::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }

        .panel-content::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Cards */
        .card {
            background: var(--sn-surface-alt);
            border: 1px solid var(--sn-border);
            border-radius: 10px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.25s ease;
            overflow: hidden;
            position: relative;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(0, 229, 199, 0) 0%, rgba(0, 229, 199, 0.1) 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .card:hover {
            background: rgba(0, 229, 199, 0.08);
            border-color: var(--sn-accent);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px var(--sn-glow);
        }

        .card:hover::before {
            opacity: 1;
        }

        /* Widget cards (Docker) */
        .widget-card {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .widget-thumbnail {
            width: 100%;
            height: 80px;
            background: linear-gradient(135deg, rgba(168, 85, 247, 0.1) 0%, rgba(0, 229, 199, 0.05) 100%);
            border-radius: 8px;
            border: 1px solid var(--sn-border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            transition: all 0.3s ease;
        }

        .card:hover .widget-thumbnail {
            border-color: var(--sn-accent);
            box-shadow: inset 0 0 12px var(--sn-glow-alt);
        }

        .widget-label {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.3px;
            color: var(--sn-text);
            text-transform: uppercase;
        }

        .widget-hint {
            font-size: 10px;
            color: var(--sn-text-muted);
            text-transform: uppercase;
            letter-spacing: 0.2px;
            opacity: 0.6;
        }

        /* Properties panel */
        .property-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .property-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--sn-text-muted);
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }

        .property-input {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--sn-border);
            border-radius: 6px;
            padding: 8px 10px;
            color: var(--sn-text);
            font-family: 'Space Grotesk', monospace;
            font-size: 12px;
            transition: all 0.25s ease;
        }

        .property-input:focus {
            outline: none;
            background: rgba(0, 229, 199, 0.05);
            border-color: var(--sn-accent);
            box-shadow: 0 0 8px var(--sn-glow);
        }

        .property-row {
            display: flex;
            gap: 8px;
        }

        .property-row .property-input {
            flex: 1;
        }

        /* Asset cards */
        .asset-card {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .asset-thumbnail {
            width: 56px;
            height: 56px;
            border-radius: 8px;
            background: linear-gradient(135deg, rgba(0, 229, 199, 0.1) 0%, rgba(168, 85, 247, 0.05) 100%);
            border: 1px solid var(--sn-border);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.3s ease;
        }

        .card:hover .asset-thumbnail {
            border-color: var(--sn-accent);
            box-shadow: inset 0 0 8px var(--sn-glow);
        }

        .asset-info {
            flex: 1;
            min-width: 0;
        }

        .asset-name {
            font-size: 12px;
            font-weight: 600;
            color: var(--sn-text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .asset-category {
            font-size: 10px;
            color: var(--sn-text-muted);
            text-transform: uppercase;
            letter-spacing: 0.2px;
        }

        /* Panel title */
        .panel-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--sn-text);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        /* Empty state */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 12px;
            padding: 20px;
            opacity: 0.7;
        }

        .empty-icon {
            width: 40px;
            height: 40px;
            stroke: var(--sn-text-muted);
            opacity: 0.4;
        }

        .empty-text {
            font-size: 11px;
            color: var(--sn-text-muted);
            line-height: 1.4;
        }

        /* Separator */
        .divider {
            height: 1px;
            background: var(--sn-border);
            margin: 4px 0;
        }
    </style>
</head>
<body>
    <div class="canvas-container">
        <!-- LEFT PANEL: Assets -->
        <div class="panel-left">
            <div class="glass-panel" style="flex: 1;">
                <div class="panel-tabs">
                    <div class="tab-handle active">
                        <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
                        </svg>
                    </div>
                    <div class="tab-handle">
                        <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/>
                        </svg>
                    </div>
                </div>
                <div class="panel-content">
                    <div class="panel-title">Stickers</div>
                    <div class="card asset-card">
                        <div class="asset-thumbnail">🎨</div>
                        <div class="asset-info">
                            <div class="asset-name">Brushes</div>
                            <div class="asset-category">Art</div>
                        </div>
                    </div>
                    <div class="card asset-card">
                        <div class="asset-thumbnail">🌟</div>
                        <div class="asset-info">
                            <div class="asset-name">Sparkles</div>
                            <div class="asset-category">Effects</div>
                        </div>
                    </div>
                    <div class="card asset-card">
                        <div class="asset-thumbnail">🔮</div>
                        <div class="asset-info">
                            <div class="asset-name">Orbs</div>
                            <div class="asset-category">Magic</div>
                        </div>
                    </div>
                    <div class="divider"></div>
                    <div class="panel-title">Widgets</div>
                    <div class="card asset-card">
                        <div class="asset-thumbnail">📝</div>
                        <div class="asset-info">
                            <div class="asset-name">Sticky Note</div>
                            <div class="asset-category">Built-in</div>
                        </div>
                    </div>
                    <div class="card asset-card">
                        <div class="asset-thumbnail">⏱️</div>
                        <div class="asset-info">
                            <div class="asset-name">Timer</div>
                            <div class="asset-category">Utilities</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- CENTER: Canvas -->
        <div class="canvas-center">
            <div class="canvas-grid">
                Canvas Area<br/>
                (Infinite 2D Workspace)
            </div>
        </div>

        <!-- RIGHT PANELS: Docker + Properties -->
        <div class="panel-right">
            <!-- Docker Panel (top) -->
            <div class="glass-panel" style="flex: 0 0 320px;">
                <div class="panel-tabs">
                    <div class="tab-handle active">
                        <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
                        </svg>
                    </div>
                </div>
                <div class="panel-content">
                    <div class="panel-title">Docker</div>
                    <div class="card widget-card">
                        <div class="widget-thumbnail">📊</div>
                        <div class="widget-label">Dashboard</div>
                        <div class="widget-hint">Widget • Connected</div>
                    </div>
                    <div class="card widget-card">
                        <div class="widget-thumbnail">📈</div>
                        <div class="widget-label">Analytics</div>
                        <div class="widget-hint">Widget • Data Synced</div>
                    </div>
                </div>
            </div>

            <!-- Properties Panel (bottom) -->
            <div class="glass-panel" style="flex: 1; min-height: 0;">
                <div class="panel-tabs">
                    <div class="tab-handle active">
                        <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="1"/><path d="M12 1v6m0 6v6"/><path d="M4.22 4.22l4.24 4.24m2.12 2.12l4.24 4.24"/>
                        </svg>
                    </div>
                </div>
                <div class="panel-content">
                    <div class="panel-title">Properties</div>

                    <div class="property-group">
                        <div class="property-label">Position</div>
                        <div class="property-row">
                            <input class="property-input" type="text" placeholder="X" value="128"/>
                            <input class="property-input" type="text" placeholder="Y" value="256"/>
                        </div>
                    </div>

                    <div class="divider"></div>

                    <div class="property-group">
                        <div class="property-label">Size</div>
                        <div class="property-row">
                            <input class="property-input" type="text" placeholder="W" value="320"/>
                            <input class="property-input" type="text" placeholder="H" value="180"/>
                        </div>
                    </div>

                    <div class="divider"></div>

                    <div class="property-group">
                        <div class="property-label">Rotation</div>
                        <input class="property-input" type="text" placeholder="Degrees" value="0°"/>
                    </div>

                    <div class="divider"></div>

                    <div class="property-group">
                        <div class="property-label">Opacity</div>
                        <input class="property-input" type="text" placeholder="0-100" value="100%"/>
                    </div>

                    <div class="divider"></div>

                    <div class="property-group">
                        <div class="property-label">Z-Index</div>
                        <input class="property-input" type="text" placeholder="Order" value="12"/>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Micro-interactions
        document.querySelectorAll('.tab-handle').forEach(handle => {
            handle.addEventListener('click', function() {
                document.querySelectorAll('.tab-handle').forEach(h => h.classList.remove('active'));
                this.classList.add('active');
            });
        });

        document.querySelectorAll('.card').forEach(card => {
            card.addEventListener('mouseenter', function() {
                this.style.animation = 'none';
                setTimeout(() => {
                    this.style.animation = '';
                }, 10);
            });
        });

        // Property input focus effects
        document.querySelectorAll('.property-input').forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.style.transform = 'scale(1.02)';
            });
            input.addEventListener('blur', function() {
                this.parentElement.style.transform = 'scale(1)';
            });
        });
    </script>
</body>
</html>
