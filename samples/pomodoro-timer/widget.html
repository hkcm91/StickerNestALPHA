<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pomodoro Timer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sn-bg: #0f0f13;
    --sn-surface: #1a1a24;
    --sn-accent: #7c6af7;
    --sn-text: #e8e8f0;
    --sn-text-muted: #6b6b80;
    --sn-border: #2a2a3a;
    --sn-radius: 12px;
    --sn-font-family: system-ui, -apple-system, sans-serif;

    --work-color: #7c6af7;
    --break-color: #3ecf8e;
    --ring-size: 180px;
    --ring-stroke: 10;
  }

  html, body {
    width: 100%;
    height: 100%;
    background: var(--sn-bg);
    color: var(--sn-text);
    font-family: var(--sn-font-family);
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .widget {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    padding: 28px 24px;
    width: 100%;
    max-width: 280px;
  }

  /* Mode badge */
  .mode-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    background: color-mix(in srgb, var(--mode-color) 15%, transparent);
    color: var(--mode-color);
    border: 1px solid color-mix(in srgb, var(--mode-color) 30%, transparent);
    transition: all 0.4s ease;
  }

  .mode-badge::before {
    content: '';
    display: block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--mode-color);
    animation: pulse-dot 2s ease-in-out infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.7); }
  }

  /* Progress ring */
  .ring-container {
    position: relative;
    width: var(--ring-size);
    height: var(--ring-size);
  }

  .ring-svg {
    width: 100%;
    height: 100%;
    transform: rotate(-90deg);
  }

  .ring-track {
    fill: none;
    stroke: var(--sn-border);
    stroke-width: var(--ring-stroke);
  }

  .ring-progress {
    fill: none;
    stroke: var(--mode-color);
    stroke-width: var(--ring-stroke);
    stroke-linecap: round;
    transition: stroke-dashoffset 0.9s linear, stroke 0.4s ease;
    filter: drop-shadow(0 0 6px color-mix(in srgb, var(--mode-color) 60%, transparent));
  }

  .ring-center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
  }

  .time-display {
    font-size: 36px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    letter-spacing: -1px;
    color: var(--sn-text);
    transition: transform 0.1s ease;
  }

  .time-display.tick {
    transform: scale(1.03);
  }

  .session-count {
    font-size: 11px;
    color: var(--sn-text-muted);
    letter-spacing: 0.05em;
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    border: none;
    border-radius: var(--sn-radius);
    cursor: pointer;
    font-family: var(--sn-font-family);
    font-weight: 600;
    transition: transform 0.15s ease, opacity 0.15s ease, background 0.2s ease;
    user-select: none;
    -webkit-user-select: none;
  }

  .btn:active { transform: scale(0.94); }

  .btn-primary {
    padding: 10px 20px;
    font-size: 14px;
    background: var(--mode-color);
    color: #fff;
    min-width: 100px;
  }

  .btn-primary:hover { opacity: 0.88; }

  .btn-secondary {
    padding: 10px 14px;
    font-size: 13px;
    background: var(--sn-surface);
    color: var(--sn-text-muted);
    border: 1px solid var(--sn-border);
  }

  .btn-secondary:hover {
    color: var(--sn-text);
    border-color: var(--sn-text-muted);
  }

  /* Session dots */
  .session-dots {
    display: flex;
    gap: 6px;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--sn-border);
    transition: background 0.3s ease, transform 0.3s ease;
  }

  .dot.filled {
    background: var(--mode-color);
    transform: scale(1.1);
  }

  /* Completion flash */
  @keyframes complete-flash {
    0% { opacity: 0; transform: scale(0.95); }
    30% { opacity: 1; transform: scale(1.02); }
    100% { opacity: 0; transform: scale(1); }
  }

  .complete-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: color-mix(in srgb, var(--mode-color) 12%, transparent);
    border-radius: var(--sn-radius);
    pointer-events: none;
  }

  .complete-overlay.show {
    display: block;
    animation: complete-flash 1.2s ease forwards;
  }
</style>
</head>
<body>
<div class="widget">
  <div class="mode-badge" id="modeBadge">Work</div>

  <div class="ring-container">
    <svg class="ring-svg" viewBox="0 0 180 180" id="ringSvg">
      <circle class="ring-track" cx="90" cy="90" r="80" />
      <circle class="ring-progress" cx="90" cy="90" r="80" id="ringProgress" />
    </svg>
    <div class="ring-center">
      <div class="time-display" id="timeDisplay">25:00</div>
      <div class="session-count" id="sessionCount">Session 1</div>
    </div>
  </div>

  <div class="controls">
    <button class="btn btn-secondary" id="resetBtn" title="Reset">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="1 4 1 10 7 10"></polyline>
        <path d="M3.51 15a9 9 0 1 0 .49-5"></path>
      </svg>
    </button>
    <button class="btn btn-primary" id="startBtn">Start</button>
    <button class="btn btn-secondary" id="modeToggleBtn" title="Switch mode">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="17 1 21 5 17 9"></polyline>
        <path d="M3 11V9a4 4 0 0 1 4-4h14"></path>
        <polyline points="7 23 3 19 7 15"></polyline>
        <path d="M21 13v2a4 4 0 0 1-4 4H3"></path>
      </svg>
    </button>
  </div>

  <div class="session-dots" id="sessionDots">
    <div class="dot" data-i="0"></div>
    <div class="dot" data-i="1"></div>
    <div class="dot" data-i="2"></div>
    <div class="dot" data-i="3"></div>
  </div>
</div>

<div class="complete-overlay" id="completeOverlay"></div>

<script>
(function () {
  'use strict';

  // ── SDK shim ──────────────────────────────────────────────────────────────
  const SN = window.StickerNest || {
    _handlers: {},
    register(m) { this._manifest = m; },
    ready() {},
    getConfig() { return {}; },
    setState(k, v) { try { localStorage.setItem('sn:pomodoro:' + k, JSON.stringify(v)); } catch {} },
    getState(k) { try { const r = localStorage.getItem('sn:pomodoro:' + k); return r ? JSON.parse(r) : null; } catch { return null; } },
    emit(t, p) { console.debug('[SN emit]', t, p); },
    onThemeChange(fn) { this._themeFn = fn; },
  };

  // ── Manifest ──────────────────────────────────────────────────────────────
  SN.register({
    id: 'sample-pomodoro-timer',
    version: '1.0.0',
    events: {
      emits: ['timer.started', 'timer.completed'],
      subscribes: [],
    },
  });

  // ── Config ────────────────────────────────────────────────────────────────
  const cfg = SN.getConfig() || {};
  const WORK_SECS = ((cfg.workMinutes ?? 25) | 0) * 60;
  const BREAK_SECS = ((cfg.breakMinutes ?? 5) | 0) * 60;

  // ── State ─────────────────────────────────────────────────────────────────
  let isWork = true;
  let totalSecs = WORK_SECS;
  let remainSecs = WORK_SECS;
  let running = false;
  let sessionsDone = 0;
  let raf = null;
  let lastTs = null;

  // Restore persisted state
  (function restore() {
    const saved = SN.getState('timer');
    if (saved && typeof saved === 'object') {
      isWork = saved.isWork ?? true;
      remainSecs = saved.remainSecs ?? WORK_SECS;
      sessionsDone = saved.sessionsDone ?? 0;
      totalSecs = isWork ? WORK_SECS : BREAK_SECS;
      // never auto-resume after page reload
      running = false;
    }
  })();

  // ── DOM refs ──────────────────────────────────────────────────────────────
  const modeBadge = document.getElementById('modeBadge');
  const timeDisplay = document.getElementById('timeDisplay');
  const sessionCount = document.getElementById('sessionCount');
  const startBtn = document.getElementById('startBtn');
  const resetBtn = document.getElementById('resetBtn');
  const modeToggleBtn = document.getElementById('modeToggleBtn');
  const ringProgress = document.getElementById('ringProgress');
  const sessionDots = document.querySelectorAll('.dot');
  const completeOverlay = document.getElementById('completeOverlay');

  const CIRCUMFERENCE = 2 * Math.PI * 80; // r=80
  ringProgress.style.strokeDasharray = CIRCUMFERENCE;

  // ── Theme ─────────────────────────────────────────────────────────────────
  SN.onThemeChange(function (tokens) {
    if (!tokens) return;
    const root = document.documentElement;
    Object.entries(tokens).forEach(([k, v]) => root.style.setProperty(k, v));
    applyModeColor();
  });

  function getModeColor() {
    return isWork
      ? getComputedStyle(document.documentElement).getPropertyValue('--work-color').trim() || '#7c6af7'
      : getComputedStyle(document.documentElement).getPropertyValue('--break-color').trim() || '#3ecf8e';
  }

  function applyModeColor() {
    document.documentElement.style.setProperty('--mode-color', getModeColor());
  }

  // ── Render ────────────────────────────────────────────────────────────────
  function formatTime(secs) {
    const m = Math.floor(secs / 60).toString().padStart(2, '0');
    const s = (secs % 60).toString().padStart(2, '0');
    return m + ':' + s;
  }

  function render() {
    applyModeColor();
    modeBadge.textContent = isWork ? 'Work' : 'Break';
    timeDisplay.textContent = formatTime(remainSecs);
    sessionCount.textContent = 'Session ' + (sessionsDone + 1);
    startBtn.textContent = running ? 'Pause' : 'Start';

    const fraction = totalSecs > 0 ? remainSecs / totalSecs : 0;
    ringProgress.style.strokeDashoffset = CIRCUMFERENCE * (1 - fraction);

    sessionDots.forEach(function (dot, i) {
      dot.classList.toggle('filled', i < sessionsDone % 4);
    });
  }

  // ── Tick animation ────────────────────────────────────────────────────────
  function tickAnim() {
    timeDisplay.classList.add('tick');
    setTimeout(function () { timeDisplay.classList.remove('tick'); }, 100);
  }

  // ── Timer loop ────────────────────────────────────────────────────────────
  function loop(ts) {
    if (!running) return;
    if (lastTs === null) { lastTs = ts; }
    const elapsed = ts - lastTs;
    if (elapsed >= 1000) {
      lastTs = ts + (elapsed - 1000);
      remainSecs = Math.max(0, remainSecs - 1);
      tickAnim();
      render();
      if (remainSecs === 0) {
        complete();
        return;
      }
      persist();
    }
    raf = requestAnimationFrame(loop);
  }

  function complete() {
    running = false;
    lastTs = null;
    SN.emit('timer.completed', { mode: isWork ? 'work' : 'break', sessions: sessionsDone });

    // flash overlay
    completeOverlay.classList.remove('show');
    void completeOverlay.offsetWidth;
    completeOverlay.classList.add('show');

    if (isWork) sessionsDone++;
    isWork = !isWork;
    totalSecs = isWork ? WORK_SECS : BREAK_SECS;
    remainSecs = totalSecs;
    persist();
    render();
  }

  function persist() {
    SN.setState('timer', { isWork, remainSecs, sessionsDone });
  }

  // ── Controls ──────────────────────────────────────────────────────────────
  startBtn.addEventListener('click', function () {
    if (running) {
      running = false;
      lastTs = null;
      if (raf) { cancelAnimationFrame(raf); raf = null; }
    } else {
      running = true;
      SN.emit('timer.started', { mode: isWork ? 'work' : 'break', remaining: remainSecs });
      raf = requestAnimationFrame(loop);
    }
    render();
  });

  resetBtn.addEventListener('click', function () {
    running = false;
    lastTs = null;
    if (raf) { cancelAnimationFrame(raf); raf = null; }
    remainSecs = totalSecs;
    persist();
    render();
  });

  modeToggleBtn.addEventListener('click', function () {
    running = false;
    lastTs = null;
    if (raf) { cancelAnimationFrame(raf); raf = null; }
    isWork = !isWork;
    totalSecs = isWork ? WORK_SECS : BREAK_SECS;
    remainSecs = totalSecs;
    persist();
    render();
  });

  // ── Init ──────────────────────────────────────────────────────────────────
  render();
  SN.ready();
})();
</script>
</body>
</html>
